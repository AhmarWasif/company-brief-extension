<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Brief</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 440px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: #1a1a2e;
      background: #f8f9fb;
    }

    .container {
      padding: 24px;
      position: relative;
    }

    .header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 24px;
    }

    header {
      margin-bottom: 0;
      flex: 1;
      min-width: 0;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a2e;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    header p {
      font-size: 13px;
      color: #5c6370;
      line-height: 1.45;
    }

    button {
      width: 100%;
      padding: 12px 20px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      background: #2c4a6e;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    button:hover {
      background: #243d5c;
    }

    button:active {
      background: #1e334d;
    }

    #response {
      margin-top: 20px;
      padding: 16px;
      background: #fff;
      border: 1px solid #e2e6ec;
      border-radius: 8px;
      font-size: 13px;
      color: #4a5568;
      line-height: 1.55;
      max-height: 520px;
      overflow-y: auto;
    }

    #response.status-message {
      color: #5c6370;
    }

    #response.error-message {
      color: #8b3a3a;
    }

    .loading-row {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #5c6370;
    }

    .loading-text {
      font-size: 13px;
      line-height: 1.45;
    }

    .spinner {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      border: 2px solid #e2e6ec;
      border-top-color: #2c4a6e;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .brief-body {
      line-height: 1.6;
      color: #374151;
    }

    .brief-body h2 {
      font-size: 14px;
      font-weight: 600;
      color: #2c4a6e;
      margin: 18px 0 8px;
      letter-spacing: -0.01em;
    }

    .brief-body h2:first-child {
      margin-top: 0;
    }

    .brief-body p {
      margin-bottom: 12px;
      font-size: 13px;
    }

    .brief-body p:last-child {
      margin-bottom: 0;
    }

    .brief-body ul {
      margin: 0 0 14px;
      padding-left: 22px;
      list-style-type: disc;
    }

    .brief-body li {
      margin-bottom: 6px;
      font-size: 13px;
      padding-left: 4px;
    }

    .brief-body li:last-child {
      margin-bottom: 0;
    }

    .brief-body strong {
      font-weight: 600;
      color: #1a1a2e;
    }

    .copy-btn {
      width: auto;
      margin-top: 16px;
      padding: 8px 14px;
      font-size: 12px;
      background: #fff;
      color: #2c4a6e;
      border: 1px solid #c5cdd8;
    }

    .copy-btn:hover {
      background: #f0f4f8;
    }

    .copy-btn:active {
      background: #e8edf2;
    }

    .history-btn {
      width: auto;
      flex-shrink: 0;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 500;
      color: #2c4a6e;
      background: #fff;
      border: 1px solid #c5cdd8;
      border-radius: 6px;
      white-space: nowrap;
    }

    .history-btn:hover {
      background: #f0f4f8;
    }

    .history-btn:active {
      background: #e8edf2;
    }

    .history-overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
    }

    .history-overlay[hidden] {
      display: none;
    }

    .history-backdrop {
      position: absolute;
      inset: 0;
    }

    .history-panel {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 320px;
      max-height: calc(100% - 48px);
      background: #fff;
      border: 1px solid #e2e6ec;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(26, 26, 46, 0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .history-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid #e2e6ec;
      font-size: 13px;
      font-weight: 600;
      color: #1a1a2e;
    }

    .history-close {
      width: auto;
      padding: 2px 6px;
      font-size: 14px;
      line-height: 1;
      color: #5c6370;
      background: none;
      border: none;
      border-radius: 4px;
    }

    .history-close:hover {
      background: #f0f4f8;
      color: #1a1a2e;
    }

    .history-list {
      overflow-y: auto;
      max-height: 340px;
    }

    .history-empty {
      padding: 20px 14px;
      font-size: 13px;
      color: #8b919a;
      text-align: center;
    }

    .history-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid #f0f2f5;
      cursor: pointer;
      transition: background 0.12s ease;
    }

    .history-item:hover {
      background: #f8f9fb;
    }

    .history-item-main {
      flex: 1;
      min-width: 0;
    }

    .history-item-name {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a2e;
      line-height: 1.35;
      margin-bottom: 2px;
    }

    .history-item-url {
      font-size: 12px;
      color: #8b919a;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-item-time {
      font-size: 11px;
      color: #5c6370;
      margin-top: 3px;
    }

    .history-item-delete {
      width: auto;
      flex-shrink: 0;
      padding: 2px 6px;
      font-size: 13px;
      line-height: 1;
      color: #8b919a;
      background: none;
      border: none;
      border-radius: 4px;
    }

    .history-item-delete:hover {
      background: #fdecec;
      color: #8b3a3a;
    }

    .history-clear-all {
      width: 100%;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 500;
      color: #5c6370;
      background: #fff;
      border: none;
      border-top: 1px solid #e2e6ec;
      border-radius: 0;
      text-align: center;
    }

    .history-clear-all:hover {
      background: #f8f9fb;
      color: #2c4a6e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-row">
      <header>
        <h1>Company Brief</h1>
        <p>AI-powered company research for the page you're viewing.</p>
      </header>
      <button type="button" id="history-btn" class="history-btn" hidden>History (0)</button>
    </div>

    <div id="history-overlay" class="history-overlay" hidden>
      <div class="history-backdrop" id="history-backdrop"></div>
      <div class="history-panel">
        <div class="history-panel-header">
          <span>Saved briefs</span>
          <button type="button" id="history-close" class="history-close" aria-label="Close history">✕</button>
        </div>
        <div id="history-list" class="history-list"></div>
        <button type="button" id="history-clear-all" class="history-clear-all">Clear all</button>
      </div>
    </div>

    <button type="button" id="generate-btn">Generate brief</button>

    <div id="response">
      Click the button above to generate a brief of the current page.
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
